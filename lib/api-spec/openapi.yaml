      description: |
        Returns aggregated budget targets, actuals, and attainment for the
        full portfolio for the given year.
        Registered before `/budget/{slug}` so the literal segment
        "portfolio" is never interpreted as an entity slug.
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/yearQuery"
      responses:
        "200":
          description: Portfolio budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
