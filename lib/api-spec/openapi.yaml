                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Validation ───────────────────────────────────────────────────────────────

  /validation:
    get:
      operationId: getValidation
      tags: [validation]
      summary: Validation summary
      description: Returns the pipeline's validation summary (pass/fail counts, entities, rules).
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Validation summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /validation/matrix:
    get:
      operationId: getValidationMatrix
      tags: [validation]
      summary: Per-entity × per-rule validation matrix
      description: |
        Returns a matrix of validation outcomes per entity per rule,
        derived strictly from the pipeline's published summary output.
        Cells are "unknown" when the pipeline never reported an outcome.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Validation matrix
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Drive ─────────────────────────────────────────────────────────────────────

  /drive/status:
    get:
      operationId: driveStatus
      tags: [drive]
      summary: Google Drive connectivity status
      description: Returns configuration and connectivity state for the Google Drive data source.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Drive status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Briefing (legacy) ─────────────────────────────────────────────────────────

  /briefing:
    get:
      operationId: getBriefing
      tags: [briefing]
      summary: AI CFO briefing (legacy alias for /api/ai/briefing)
      description: |
        Stable legacy URL that proxies to the AI Platform's briefing
        capability. Cached for 15 minutes; concurrent requests are
        deduplicated. Prefer `/api/ai/briefing` for new integrations.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: CFO briefing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Rules / Alerts ────────────────────────────────────────────────────────────

  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: Registered rules metadata
      description: Returns metadata for every rule registered in the rules engine (no evaluation).
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Rules list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /alerts:
    get:
      operationId: listAlerts
      tags: [rules]
      summary: All active alerts
      description: |
        Returns every non-resolved alert read directly from FinanceOS Core
        (Neon). The Dashboard does not calculate alerts — they are
        sourced as-is from the Core `alerts` table.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Active alerts list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /alerts/portfolio:
    get:
      operationId: listPortfolioAlerts
      tags: [rules]
      summary: Portfolio-scoped alerts
      description: |
        Returns non-resolved alerts with `scope = "portfolio"` (Core
        entity_id IS NULL). Registered before `/alerts/{entity}` so the
        literal path segment "portfolio" is never treated as an entity.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Portfolio alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /alerts/{entity}:
    get:
      operationId: listEntityAlerts
      tags: [rules]
      summary: Alerts for a single entity
      description: |
        Matches by Core slug (lower-case), display-cased slug, or display
        name. Returns only non-resolved entity-scoped alerts.
      security:
        - sessionCookie: []
      parameters:
        - name: entity
          in: path
          required: true
          schema:
            type: string
          description: Entity slug or display name (case-insensitive match)
      responses:
        "200":
          description: Entity alerts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Reports ───────────────────────────────────────────────────────────────────

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List available report templates
      description: Returns metadata for all enabled and disabled report templates.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Report template list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /reports/history:
    get:
      operationId: listReportHistory
      tags: [reports]
      summary: List report generation history
      description: |
        Returns persisted report generation records from the Dashboard operational
        database, ordered newest-first. Optionally filter to a single entity with
        `?slug=`. Supports pagination via `limit` and `offset`.
      security:
        - sessionCookie: []
      parameters:
        - name: slug
          in: query
          required: false
          schema:
            type: string
          description: Entity slug to filter history by (e.g. `cardealer_ai`)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Report history list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          description: Invalid slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /reports/generate:
    post:
      operationId: generateReport
      tags: [reports]
      summary: Generate a report
      description: |
        Builds and renders a report. Requires the `reports` permission.

        When `format` is `json`, returns a JSON envelope. When `format` is
        `pdf`, `excel`, or `html`, streams the binary/text output directly
        with the appropriate `Content-Type` and `Content-Disposition` headers
        — not wrapped in the standard JSON envelope.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportGenerateRequest"
      responses:
        "200":
          description: |
            Report output. Content-Type varies by `format`:
            - `json` → `application/json`
            - `pdf` → `application/pdf`
            - `excel` → `application/vnd.openxmlformats-officedocument.spreadsheetml.sheet`
            - `html` → `text/html`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
            application/pdf:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            text/html:
              schema:
                type: string
        "400":
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/{template}:
    get:
      operationId: getReportTemplate
      tags: [reports]
      summary: Get a single report template definition
      security:
        - sessionCookie: []
      parameters:
        - name: template
          in: path
          required: true
          schema:
            type: string
          description: Report template ID
      responses:
        "200":
          description: Template definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── AI ────────────────────────────────────────────────────────────────────────

  /ai/status:
    get:
      operationId: aiStatus
      tags: [ai]
      summary: AI provider identity and availability
      description: |
        Returns provider name, model, availability flag, cache statistics,
        and token/cost settings. Never exposes API keys or prompts.
        Requires `ai` permission.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: AI status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /ai/usage:
    get:
      operationId: aiUsage
      tags: [ai]
      summary: AI cost and usage tracking
      description: |
        Returns daily and total request counts, token usage, and estimated
        cost. Never exposes API keys, prompts, or raw context data.
        Requires `ai` permission.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: AI usage stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /ai/briefing:
    get:
      operationId: aiBriefing
      tags: [ai]
      summary: AI-generated CFO briefing
      description: |
        Generates (or returns from 15-minute cache) a structured CFO
        briefing covering portfolio highlights, risks, opportunities,
        and priorities. Concurrent requests are deduplicated.
        Requires `ai` permission.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: CFO briefing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /ai/report-summary:
    post:
      operationId: aiReportSummary
      tags: [ai]
      summary: AI-generated narrative summary of report sections
      description: |
        Accepts optional report section data and returns a natural-language
        narrative summary. Requires `ai` permission.
      security:
        - sessionCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiReportSummaryRequest"
      responses:
        "200":
          description: Report narrative summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /ai/analyze:
    post:
      operationId: aiAnalyze
      tags: [ai]
      summary: AI financial analysis
      description: |
        Runs the AI provider's `analyzeFinancials` capability over the
        given entities (or all entities when omitted).
        Requires `ai` permission.
      security:
        - sessionCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAnalyzeRequest"
      responses:
        "200":
          description: Financial analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /ai/question:
    post:
      operationId: aiQuestion
      tags: [ai]
      summary: Answer a natural-language question about the portfolio
      description: Requires `ai` permission.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiQuestionRequest"
      responses:
        "200":
          description: Answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          description: Missing or invalid `question` field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Budget ────────────────────────────────────────────────────────────────────

  /budget/portfolio:
    get:
      operationId: getBudgetPortfolio
      tags: [budget]
      summary: Portfolio-level budget summary
      description: |
        Returns aggregated budget targets, actuals, and attainment for the
        full portfolio for the given year.
        Registered before `/budget/{slug}` so the literal segment
        "portfolio" is never interpreted as an entity slug.
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/yearQuery"
      responses:
        "200":
          description: Portfolio budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /budget/{slug}:
    get:
      operationId: getEntityBudget
      tags: [budget]
      summary: Entity budget with month-by-month breakdown
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/entitySlug"
        - $ref: "#/components/parameters/yearQuery"
      responses:
        "200":
          description: Entity budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /budget/{slug}/vs-actual:
    get:
      operationId: getEntityBudgetVsActual
      tags: [budget]
      summary: Budget vs actual comparison for one entity
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/entitySlug"
        - $ref: "#/components/parameters/yearQuery"
      responses:
        "200":
          description: Budget vs actual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /budget/{slug}/annual:
    get:
      operationId: getEntityAnnualBudget
      tags: [budget]
      summary: Annual budget targets for one entity
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/entitySlug"
        - $ref: "#/components/parameters/yearQuery"
      responses:
        "200":
          description: Annual budget row (null data when no annual budget exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
    put:
      operationId: upsertEntityAnnualBudget
      tags: [budget]
      summary: Create or replace annual budget targets for one entity
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/entitySlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetAnnualInput"
      responses:
        "200":
          description: Saved annual budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /budget/{slug}/period:
    put:
      operationId: upsertEntityBudgetPeriod
      tags: [budget]
      summary: Create or replace a monthly budget period for one entity
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/entitySlug"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BudgetPeriodInput"
      responses:
        "200":
          description: Saved budget period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Report Drafts ────────────────────────────────────────────────────────────

  /drafts:
    post:
      operationId: createDraft
      tags: [ReportDrafts]
      summary: Create a new report draft
      description: Builds a live report, generates analysis, creates a draft, and persists commentary. Requires editor role (admin, cfo, controller).
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [template, period, entities]
              properties:
                template:
                  type: string
                period:
                  type: string
                entities:
                  oneOf:
                    - type: string
                      enum: [all]
                    - type: array
                      items:
                        type: string
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          description: Invalid input or unauthorized role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      operationId: listDrafts
      tags: [ReportDrafts]
      summary: List drafts for a template and period
      security:
        - sessionCookie: []
      parameters:
        - name: template
          in: query
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of drafts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          description: Missing required query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /drafts/{draftId}:
    get:
      operationId: getDraft
      tags: [ReportDrafts]
      summary: Get a single draft by ID
      security:
        - sessionCookie: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /drafts/{draftId}/edits:
    patch:
      operationId: saveDraftEdits
      tags: [ReportDrafts]
      summary: Save narrative edits to a draft
      security:
        - sessionCookie: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [editableContent]
              properties:
                editableContent:
                  type: object
                changeSummary:
                  type: string
      responses:
        "200":
          description: Updated draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          description: Invalid input or approved/superseded draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /drafts/{draftId}/versions:
    get:
      operationId: getDraftVersions
      tags: [ReportDrafts]
      summary: Get version history for a draft
      security:
        - sessionCookie: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /drafts/{draftId}/restore:
    post:
      operationId: restoreDraftVersion
      tags: [ReportDrafts]
      summary: Restore a prior version
      security:
        - sessionCookie: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [versionNumber]
              properties:
                versionNumber:
                  type: integer
      responses:
        "200":
          description: Draft after restore
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /drafts/{draftId}/submit:
    post:
      operationId: submitDraftForReview
      tags: [ReportDrafts]
      summary: Submit draft for review (draft → ready_for_review)
      security:
        - sessionCookie: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /drafts/{draftId}/approve:
    post:
      operationId: approveDraft
      tags: [ReportDrafts]
      summary: Approve a draft (admin or cfo only)
      security:
        - sessionCookie: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Approved draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          description: Stale draft or invalid state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient role (requires admin or cfo)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /drafts/{draftId}/preview:
    get:
      operationId: getDraftPreview
      tags: [ReportDrafts]
      summary: Render draft HTML preview with narrative context
      security:
        - sessionCookie: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Preview data including HTML
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /drafts/{draftId}/generate:
    post:
      operationId: generateDraftReport
      tags: [ReportDrafts]
      summary: Generate a final report from an approved draft
      description: |
        Builds a final PDF/HTML/JSON report using the approved narrative from the
        specified draft. The server reloads all financial data from authoritative
        FinanceOS sources, recomputes the data fingerprint, and rejects generation
        if the data changed since approval. Approval metadata, financial values,
        fingerprints, and narrative source labels are never accepted from the client.
      security:
        - sessionCookie: []
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftGenerateRequest"
      responses:
        "200":
          description: |
            For format=json: JSON envelope with report data and Report History linkage.
            For format=pdf: application/pdf binary attachment.
            For format=html: text/html attachment.
          headers:
            X-Draft-Id:
              schema:
                type: string
              description: The draft ID used for generation (pdf/html only).
            X-Draft-Version:
              schema:
                type: string
              description: The draft version at generation time (pdf/html only).
            X-Approved-By:
              schema:
                type: string
              description: Email of the approver (pdf/html only).
            X-History-Id:
              schema:
                type: string
              description: The new Report History row ID (pdf/html only).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
            application/pdf:
              schema:
                type: string
                format: binary
            text/html:
              schema:
                type: string
        "400":
          description: Draft is not approved, is stale, format is invalid, or fingerprint changed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: The authenticated user's role cannot generate final reports.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Commentary ───────────────────────────────────────────────────────────────

  /drafts/commentary:
    get:
      operationId: getCommentary
      tags: [ReportDrafts]
      summary: Get commentary entries for an entity, period, and template
      security:
        - sessionCookie: []
      parameters:
        - name: entity
          in: query
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: true
          schema:
            type: string
        - name: template
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Commentary entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: saveCommentary
      tags: [ReportDrafts]
      summary: Create or update a commentary entry (management_commentary or recommended_action only)
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entitySlug, reportingPeriod, templateId, sectionKey, commentaryType, content]
              properties:
                entitySlug:
                  type: string
                reportingPeriod:
                  type: string
                templateId:
                  type: string
                sectionKey:
                  type: string
                commentaryType:
                  type: string
                  enum: [management_commentary, recommended_action]
                content:
                  type: string
                sortOrder:
                  type: integer
                existingId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Saved commentary entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "400":
          description: Invalid input or forbidden type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /drafts/commentary/reorder:
    post:
      operationId: reorderCommentary
      tags: [ReportDrafts]
      summary: Reorder commentary entries
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /drafts/commentary/{commentaryId}/toggle:
    patch:
      operationId: toggleCommentary
      tags: [ReportDrafts]
      summary: Toggle whether a commentary block is included in the report
      security:
        - sessionCookie: []
      parameters:
        - name: commentaryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [included]
              properties:
                included:
                  type: boolean
      responses:
        "200":
          description: Updated commentary entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /drafts/commentary/{commentaryId}:
    delete:
      operationId: deleteCommentary
      tags: [ReportDrafts]
      summary: Delete a commentary entry (management_commentary and recommended_action only)
      security:
        - sessionCookie: []
      parameters:
        - name: commentaryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted
        "400":
          description: Cannot delete FinanceOS analysis entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /drafts/commentary/{commentaryId}/approve:
    post:
      operationId: approveCommentary
      tags: [ReportDrafts]
      summary: Approve a commentary entry (admin or cfo only)
      security:
        - sessionCookie: []
      parameters:
        - name: commentaryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Approved commentary entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Users ─────────────────────────────────────────────────────────────────────

  /users:
    get:
      operationId: listAppUsers
      tags: [users]
      summary: List all DB-resident app users
      description: |
        Returns all users created via invitation (DB-resident). Env-var accounts
        (FINANCEOS_ADMIN_EMAIL, FINANCEOS_USERS) are not included.
        Requires `user-management` permission (admin and controller roles).
        password_hash is never returned.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: List of app users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AppUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: Operational database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Invitations ───────────────────────────────────────────────────────────────

  /invitations:
    get:
      operationId: listInvitations
      tags: [invitations]
      summary: List all invitations
      description: |
        Returns all invitation records (pending, accepted, and revoked).
        Requires `user-management` permission.
        token_hash is never returned in any record.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: List of invitations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/InvitationRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: Operational database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createInvitation
      tags: [invitations]
      summary: Create a new user invitation
      description: |
        Generates a cryptographically random 64-char hex invite token (from
        crypto.randomBytes(32)). Only the SHA-256 digest is stored — the raw token
        is returned once in `invite_url` and never persisted or logged.
        Requires `user-management` permission.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
      responses:
        "201":
          description: Invitation created — invite_url contains the one-time raw token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CreateInvitationResponse"
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: An active invitation or account already exists for this email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Operational database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invitations/{token}:
    get:
      operationId: lookupInvitation
      tags: [invitations]
      summary: Validate an invite token and return invitation metadata
      description: |
        Public endpoint — no session required. Called by the accept-invite page
        on mount to pre-fill the form and confirm the token is still valid.
        Returns minimal data only (email, display_name, role, expires_at).
        token_hash is never returned.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
          description: Raw 64-char hex invite token from the invite_url
      responses:
        "200":
          description: Invitation is valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/InvitationLookupResponse"
        "404":
          description: Token not found or invalid (generic — does not distinguish bad token from expired)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Invitation already accepted, revoked, or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Operational database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invitations/{token}/accept:
    post:
      operationId: acceptInvitation
      tags: [invitations]
      summary: Accept an invitation and create a user account
      description: |
        Public endpoint — no session required. Consumes the invite token
        (single-use), hashes the password with bcrypt (cost 12), creates
        the `app_users` row, and marks the invitation accepted.
        The new user is NOT automatically logged in — they must visit /login
        and complete TOTP MFA enrollment before gaining full access.
        token_hash is never returned.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            minLength: 64
            maxLength: 64
          description: Raw 64-char hex invite token from the invite_url
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationRequest"
      responses:
        "201":
          description: Account created — user must log in and complete MFA enrollment
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AcceptInvitationResponse"
        "400":
          description: Missing fields or password shorter than 12 characters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Token not found or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invitation already accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Invitation revoked or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Operational database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invitations/{id}/revoke:
    post:
      operationId: revokeInvitation
      tags: [invitations]
      summary: Revoke a pending invitation
      description: |
        Marks the invitation as revoked so the token can no longer be accepted.
        Requires `user-management` permission. Only pending (not yet accepted
        or already revoked) invitations can be revoked.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Invitation ID (UUID)
      responses:
        "200":
          description: Invitation revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Invitation not found or already consumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Operational database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
