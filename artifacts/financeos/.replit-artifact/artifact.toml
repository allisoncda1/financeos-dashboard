kind = "web"
previewPath = "/"
title = "FinanceOS"
version = "1.0.0"
id = "artifacts/financeos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19577

[services.development]
run = "pnpm --filter @workspace/financeos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/financeos", "run", "build" ]
publicDir = "artifacts/financeos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19577"
BASE_PATH = "/"
