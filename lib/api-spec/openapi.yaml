openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FinanceOS Dashboard API

servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health and connectivity checks
  - name: auth
    description: Authentication (public — no session required)
  - name: pipeline
    description: Pipeline status and cache refresh
  - name: entities
    description: Entity registry
  - name: model
    description: Dashboard model data — portfolio, per-entity metrics, and sub-pages
  - name: validation
    description: Validation summary and rule matrix
  - name: drive
    description: Google Drive connectivity status
  - name: briefing
    description: AI-generated CFO briefing (legacy alias)
  - name: rules
    description: Rules engine metadata and alerts
  - name: reports
    description: Report templates and generation
  - name: ai
    description: AI Platform — briefing, analysis, Q&A
  - name: budget
    description: Budget targets and budget-vs-actual
  - name: users
    description: User management — DB-resident app users (requires user-management permission)
  - name: invitations
    description: Invite-only user onboarding — create, validate, and accept invitations

# ─── Reusable components ─────────────────────────────────────────────────────

components:
  # ── Security schemes ────────────────────────────────────────────────────────
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: connect.sid
      description: |
        Session cookie set by POST /api/auth/login. Required for all
        protected routes (everything except /api/healthz, /api/health,
        /api/auth/*, and /api/pipeline/* which uses its own auth).
    pipelineRefreshToken:
      type: apiKey
      in: header
      name: x-refresh-token
      description: |
        Shared webhook token for POST /api/pipeline/refresh when called by
        the external pipeline job. Alternatively, an authenticated session
        with the `pipeline_refresh` permission is accepted.

  # ── Parameters ──────────────────────────────────────────────────────────────
  parameters:
    entitySlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        enum: [CarDealer_ai, T3_Marketing, TopMrktr, Smile_More]
      description: Entity slug identifier
    yearQuery:
      name: year
      in: query
      required: false
      schema:
        type: integer
        minimum: 2020
        maximum: 2099
      description: Fiscal year (defaults to current calendar year when omitted)

  # ── Schemas ─────────────────────────────────────────────────────────────────
  schemas:
    # Primitive / envelope
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ApiEnvelope:
      type: object
      description: Standard JSON envelope returned by all successful responses
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          description: Response payload (shape varies by endpoint)
        source:
          type: string
          enum: [live, mock, cache, db]
          description: Where the data was sourced from
        ts:
          type: string
          format: date-time
          description: Server timestamp (ISO 8601)
      required: [ok, data, ts]

    SimpleOkResponse:
      type: object
      description: Minimal success envelope for endpoints that return no payload (e.g. logout)
      properties:
        ok:
          type: boolean
          enum: [true]
        ts:
          type: string
          format: date-time
          description: Server timestamp (ISO 8601)
      required: [ok, ts]

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
        code:
          type: string
          description: Machine-readable error code (optional)
        ts:
          type: string
          format: date-time
      required: [ok, error, ts]

    # Auth
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required: [email, password]

    UserInfo:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
          enum: [admin, cfo, controller, bookkeeper, investor, readonly]
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
      required: [email, role, name]

    # Budget upsert
    BudgetPeriodInput:
      type: object
      properties:
        period_start:
          type: string
          format: date
          description: "YYYY-MM-DD"
        period_end:
          type: string
          format: date
          description: "YYYY-MM-DD"
        period_type:
          type: string
          enum: [month, annual]
        revenue_target:
          type: number
          nullable: true
          minimum: 0
        cogs_target:
          type: number
          nullable: true
          minimum: 0
        opex_target:
          type: number
          nullable: true
          minimum: 0
        net_income_target:
          type: number
          nullable: true
      required: [period_start, period_end]

    BudgetAnnualInput:
      type: object
      properties:
        year:
          type: integer
          minimum: 2020
          maximum: 2099
        revenue_target:
          type: number
          nullable: true
          minimum: 0
        cogs_target:
          type: number
          nullable: true
          minimum: 0
        opex_target:
          type: number
          nullable: true
          minimum: 0
        net_income_target:
          type: number
          nullable: true
      required: [year]

    # Report generation
    ReportGenerateRequest:
      type: object
      properties:
        template:
          type: string
          description: Report template ID
        entities:
          oneOf:
            - type: string
              enum: [all]
            - type: array
              items:
                type: string
                enum: [CarDealer_ai, T3_Marketing, TopMrktr, Smile_More]
        period:
          type: string
          description: Reporting period string (e.g. "2026-Q2" or "2026-07")
        format:
          type: string
          enum: [json, pdf, excel, html]
      required: [template, period, format, entities]

    ReportHistoryEntry:
      type: object
      description: A single persisted report generation record
      properties:
        id:
          type: string
          format: uuid
        template:
          type: string
        title:
          type: string
        period:
          type: string
        format:
          type: string
          enum: [json, pdf, excel, html]
        entitySlugs:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [queued, processing, completed, failed]
        source:
          type: string
          nullable: true
          enum: [live, cache, mock, db]
        dataFreshness:
          type: string
          nullable: true
        entityCount:
          type: integer
          nullable: true
        confidenceScore:
          type: integer
          nullable: true
        requestedBy:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        draftId:
          type: string
          format: uuid
          nullable: true
          description: The approved draft this report was generated from, or null for direct generation.
        draftVersion:
          type: integer
          nullable: true
          description: The draft version at time of generation.
        approvalStatus:
          type: string
          nullable: true
          enum: [not_required, approved, auto_approved]
          description: Approval workflow status at generation time.
        approvedBy:
          type: string
          nullable: true
          description: Email of the approver, or null for direct generation.
        approvedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of draft approval.
        dataFingerprint:
          type: string
          nullable: true
          description: SHA-256 fingerprint of the financial data used at generation time.
        commentaryVersion:
          type: integer
          nullable: true
          description: Max version number of the included commentary entries.
      required: [id, template, title, period, format, entitySlugs, status, createdAt]

    DraftGenerateRequest:
      type: object
      description: Request body for POST /drafts/{draftId}/generate
      properties:
        format:
          type: string
          enum: [json, pdf, html]
          description: Output format. Excel is not supported for draft-generated reports (narrative context is not available to the Excel renderer).
      required: [format]

    # User management
    AppUser:
      type: object
      description: |
        A DB-resident app user created via invitation. Never includes
        password_hash or token_hash — those fields are never surfaced in any API response.
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [admin, cfo, controller, bookkeeper, investor, readonly]
        status:
          type: string
          enum: [active, disabled]
          description: Account status — "active" or "disabled"
        mfa_required:
          type: boolean
        mfa_complete:
          type: boolean
        invited_by:
          type: string
          format: email
          description: Email of the user who created this invitation
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true
      required: [id, email, display_name, role, status, mfa_required, mfa_complete, invited_by, created_at, updated_at]

    InvitationRecord:
      type: object
      description: |
        A pending or consumed invitation record. token_hash is never included —
        only the opaque invite_url (raw token embedded) is returned at creation time.
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [admin, cfo, controller, bookkeeper, investor, readonly]
        invited_by:
          type: string
          format: email
        expires_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
      required: [id, email, display_name, role, invited_by, expires_at, created_at]

    CreateInvitationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address of the person being invited
        display_name:
          type: string
          description: Full name shown in the UI
        role:
          type: string
          enum: [admin, cfo, controller, bookkeeper, investor, readonly]
          description: Role assigned to the new user on account creation
      required: [email, display_name, role]

    CreateInvitationResponse:
      type: object
      description: |
        Returned once on successful invitation creation. invite_url contains the raw
        token embedded in the accept link. This is the only time the raw token is
        available — it is never stored or logged. token_hash is never returned.
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [admin, cfo, controller, bookkeeper, investor, readonly]
        invited_by:
          type: string
          format: email
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        invite_url:
          type: string
          format: uri
          description: |
            One-time invite link containing the raw token. Valid for 7 days.
            Send this to the invitee out-of-band (email, Slack, etc.).
            The raw token is never stored server-side — only its SHA-256 digest is.
      required: [id, email, display_name, role, invited_by, expires_at, created_at, invite_url]

    InvitationLookupResponse:
      type: object
      description: |
        Minimal invitation data returned when the accept page validates a token.
        Never includes token_hash or the raw token.
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [admin, cfo, controller, bookkeeper, investor, readonly]
        expires_at:
          type: string
          format: date-time
      required: [email, display_name, role, expires_at]

    AcceptInvitationRequest:
      type: object
      properties:
        password:
          type: string
          format: password
          minLength: 12
          description: Password for the new account — minimum 12 characters, stored as bcrypt hash (cost 12)
      required: [password]

    AcceptInvitationResponse:
      type: object
      description: Returned after account creation. The user is NOT logged in — they must log in and complete MFA enrollment.
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [admin, cfo, controller, bookkeeper, investor, readonly]
        mfa_required:
          type: boolean
        mfa_complete:
          type: boolean
      required: [email, display_name, role, mfa_required, mfa_complete]

    # AI
    AiAnalyzeRequest:
      type: object
      properties:
        entities:
          type: array
          items:
            type: string
            enum: [CarDealer_ai, T3_Marketing, TopMrktr, Smile_More]
          description: Optional subset of entities to analyze (omit for all)

    AiQuestionRequest:
      type: object
      properties:
        question:
          type: string
          description: Natural-language question about the portfolio
        entities:
          type: array
          items:
            type: string
            enum: [CarDealer_ai, T3_Marketing, TopMrktr, Smile_More]
      required: [question]

    AiReportSummaryRequest:
      type: object
      properties:
        template:
          type: string
          description: Optional report template name for context
        sections:
          type: object
          additionalProperties: true
          description: Report section data to summarize

  # ── Common responses ─────────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Not authenticated — session cookie missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated but lacks required permission
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

# ─── Paths ───────────────────────────────────────────────────────────────────

paths:

  # ── Health ──────────────────────────────────────────────────────────────────

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Simple health check
      description: 'Returns `{ status: "ok" }`. No authentication required.'
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /health:
    get:
      operationId: healthDetail
      tags: [health]
      summary: Detailed health status
      description: |
        Returns runtime health including data source mode, Google Drive
        connectivity, AI provider identity, and server uptime.
        No authentication required.
      responses:
        "200":
          description: Detailed health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"

  # ── Auth ────────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Log in and establish a session
      description: |
        Validates credentials and sets the `connect.sid` session cookie.
        Rate-limited to 10 requests per 15 minutes per IP.
        No authentication required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful — `connect.sid` cookie is set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Destroy the current session
      description: Clears the `connect.sid` cookie and destroys the server-side session.
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOkResponse"

  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Return the current session user
      description: |
        Returns the signed-in user's email, role, name, and effective
        permission list. Returns 401 when no valid session exists.
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Pipeline ─────────────────────────────────────────────────────────────────

  /pipeline/status:
    get:
      operationId: pipelineStatus
      tags: [pipeline]
      summary: Pipeline status summary
      description: |
        Returns the external pipeline's self-reported status (last run
        timestamp, Drive upload, QBO connection state, and a staleness
        classification). Read-only — never triggers the pipeline.
        Session authentication is NOT required for this route; it is
        mounted outside the requireAuth gate.
      responses:
        "200":
          description: Pipeline status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"

  /pipeline/refresh:
    post:
      operationId: pipelineRefresh
      tags: [pipeline]
      summary: Invalidate server-side caches
      description: |
        Clears this server's in-memory caches (Drive data, rules engine,
        AI briefing) so the next request re-fetches from Google Drive.
        Never writes to Drive or triggers any external process.

        Authorization accepts **either**:
        - An authenticated session cookie with the `pipeline_refresh`
          permission (`admin` or `controller` roles), **or**
        - The `x-refresh-token` header carrying the shared webhook token
          (used by the external pipeline job).
      security:
        - sessionCookie: []
        - pipelineRefreshToken: []
      responses:
        "200":
          description: Caches cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "503":
          description: Refresh endpoint not configured (PIPELINE_REFRESH_TOKEN env var missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Entities ─────────────────────────────────────────────────────────────────

  /entities:
    get:
      operationId: listEntities
      tags: [entities]
      summary: List all entity definitions
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Entity registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /entities/{slug}:
    get:
      operationId: getEntity
      tags: [entities]
      summary: Get a single entity definition
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/entitySlug"
      responses:
        "200":
          description: Entity definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Model ─────────────────────────────────────────────────────────────────────

  /model:
    get:
      operationId: getModel
      tags: [model]
      summary: Full dashboard model for all entities
      description: |
        Returns portfolio summary, validation summary, data freshness,
        per-entity metrics, and per-entity anomalies in a single response.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Full dashboard model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /model/history/snapshots:
    get:
      operationId: getModelHistorySnapshots
      tags: [model]
      summary: Stored monthly metric snapshots for all entities
      description: |
        Returns archived server-side metric snapshots built from live
        pipeline data. Registered before `/model/{slug}` so the literal
        path segment `history` is never interpreted as an entity slug.
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Metric snapshot history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /model/history:
    get:
      operationId: getModelHistory
      tags: [model]
      summary: Consolidated monthly history across the selected entities
      description: |
        Revenue / net-income monthly time series, month-over-month changes,
        entity-period snapshots, and the health-score trend, aggregated
        server-side from Neon's monthly `financial_periods` rows (Core) plus
        the `metric_snapshots` runtime table (Dashboard ops DB). Registered
        before `/model/{slug}` so the literal path segment `history` is never
        interpreted as an entity slug. Optional `?slugs=A,B,C` selects entities
        (defaults to all). Unknown slugs are ignored.
      security:
        - sessionCookie: []
      parameters:
        - name: slugs
          in: query
          required: false
          description: Comma-separated entity slugs to include (defaults to all).
          schema:
            type: string
      responses:
        "200":
          description: Consolidated monthly history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /model/cashflow:
    get:
      operationId: getModelCashflow
      tags: [model]
      summary: Consolidated (portfolio) statement of cash flows
      description: |
        Portfolio statement of cash flows summed server-side from published
        Neon `cash_flow_statements` rows across the selected entities.
        Registered before `/model/{slug}` so `cashflow` is never interpreted
        as an entity slug. Optional `?slugs=A,B,C` selects entities (defaults
        to all).
      security:
        - sessionCookie: []
      parameters:
        - name: slugs
          in: query
          required: false
          description: Comma-separated entity slugs to include (defaults to all).
          schema:
            type: string
      responses:
        "200":
          description: Consolidated cash flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /model/{slug}:
    get:
      operationId: getEntityModel
      tags: [model]
      summary: Single-entity metrics, anomalies, and freshness
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/entitySlug"
      responses:
        "200":
          description: Entity model data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /model/{slug}/history:
    get:
      operationId: getEntityHistory
      tags: [model]
      summary: Prior-period financial history for one entity
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/entitySlug"
      responses:
        "200":
          description: Historical financial data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /model/{slug}/financials:
    get:
      operationId: getEntityFinancials
      tags: [model]
      summary: Income statement and balance sheet for one entity
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/entitySlug"
      responses:
        "200":
          description: Financial data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /model/{slug}/customers:
    get:
      operationId: getEntityCustomers
      tags: [model]
      summary: Accounts receivable and customer aging for one entity
      security:
        - sessionCookie: []
      parameters:
        - $ref: "#/components/parameters/entitySlug"
      responses:
        "200":
          description: Customers / AR data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiEnvelope"
        "401":
